# Hexo Configuration
# 文档: https://hexo.io/zh-cn/docs/configuration

# Site
title: Gaofeicm
subtitle: 高飞嫣鱼
description: 高飞嫣鱼
author: gaofeicm
language: zh-CN
timezone: ''

# URL
## 如果你的网站存放在子目录中，如 http://example.com/blog，则将 url 设为 http://example.com 并把 root 设为 /blog/
url: https://gaofeicm.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - README.md
  - ARCHITECTURE.md

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as you want
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## Use post's date for updated date if defined
updated_option: mtime

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: next

# Deployment
## Docs: https://hexo.io/zh-cn/docs/deployment
deploy:
  type: git
  repo: https://github.com/gaofeicm/gaofeicm-work.github.io.git
  branch: gh-pages
  message: "Site updated: {{now('YYYY-MM-DD HH:mm:ss')}}"

# Search
search:
  path: search.xml
  field: post
  format: html
  limit: 10000

# Feed
feed:
  type: atom
  path: atom.xml
  limit: 20
  content_limit: 140
  order_by: -date
